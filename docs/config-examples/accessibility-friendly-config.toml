# Accessibility-Friendly Configuration
# This configuration is optimized for users with motion sensitivity, visual impairments,
# or other accessibility needs. It minimizes visual distractions while maintaining functionality.

start-at-login = true
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
accordion-padding = 20
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = false

[key-mapping]
    preset = 'qwerty'

# Larger gaps for better visual separation
[gaps]
    inner.horizontal = 12
    inner.vertical = 12
    outer.left = 12
    outer.bottom = 12
    outer.top = 12
    outer.right = 12

[bsp]
    split-ratio = 0.5
    auto-split-threshold = 1.2
    preferred-split-direction = 'auto'

# Minimal, accessibility-focused animation configuration
[animations]
    enabled = true
    default-duration = 0.08  # Very short to minimize motion
    easing-function = 'linear'  # No acceleration/deceleration
    respect-system-preferences = true  # Honor "Reduce Motion" setting
    
    # Enable only essential, non-distracting animations
    move-animation-enabled = true
    resize-animation-enabled = false  # Disabled to avoid distraction
    layout-change-animation-enabled = false  # Disabled to avoid distraction
    workspace-transition-animation-enabled = false  # Disabled to avoid distraction
    
    # Very conservative settings
    max-concurrent-animations = 1  # Only one animation at a time
    adaptive-quality = true
    min-frame-rate = 60.0  # High frame rate for smoothness
    
    # Disable GPU acceleration to avoid potential issues
    gpu-acceleration-enabled = false
    gpu-acceleration-mode = 'disabled'
    gpu-batch-size = 1
    gpu-fallback-threshold = 0.0
    
    # Simple easing parameters
    spring-damping = 2.0  # Heavily damped
    spring-velocity = 0.0
    bounce-intensity = 0.0  # No bounce
    elastic-amplitude = 0.0  # No elasticity
    elastic-period = 0.1

# Visual effects completely disabled for accessibility
[visual-effects]
    enabled = false  # Completely disabled
    adaptive-quality = false
    performance-threshold = 16.67
    max-concurrent-effects = 0
    effect-quality-level = 'low'
    enable-gpu-acceleration = false
    
    # All effects disabled
    [visual-effects.motion-blur]
        enabled = false
        velocity-threshold = 999999.0  # Never trigger
        max-speed = 0.0
        max-intensity = 0.0
        automatic-effects = false
    
    [visual-effects.afterimage]
        enabled = false
        trail-length = 0
        opacity-decay = 1.0
        update-interval = 1.0
    
    [visual-effects.particles]
        enabled = false
        count = 0
        size-width = 0.0
        size-height = 0.0
        duration = 0.0
        spread = 0.0
        velocity = 0.0
        available-types = []
        default-type = 'spark'
    
    [visual-effects.ripple]
        enabled = false
        speed = 0.0
        max-radius = 0.0
        duration = 0.0
        intensity = 0.0

# Standard key bindings with clear, predictable behavior
[mode.main.binding]
    # Layout switching
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'
    alt-period = 'layout bsp'
    
    # Window focus - clear directional movement
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'
    
    # Window movement - predictable positioning
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'
    
    # Window resizing - consistent increments
    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'
    
    # Workspace navigation - numbered for clarity
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'
    
    # Window to workspace movement
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'
    alt-shift-8 = 'move-node-to-workspace 8'
    alt-shift-9 = 'move-node-to-workspace 9'
    
    # Quick navigation
    alt-tab = 'workspace-back-and-forth'
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'
    
    # Service mode
    alt-shift-semicolon = 'mode service'

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main']
    f = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']
    
    # Window joining
    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']
    
    # System controls
    down = 'volume down'
    up = 'volume up'
    shift-down = ['volume set 0', 'mode main']

# Accessibility features of this configuration:
# 1. Respects system "Reduce Motion" preferences
# 2. Very short animation durations (0.08s) to minimize motion
# 3. Linear easing with no acceleration/deceleration
# 4. Only one animation at a time to avoid confusion
# 5. All visual effects disabled to prevent distraction
# 6. Larger gaps for better visual separation
# 7. GPU acceleration disabled to avoid potential issues
# 8. High frame rate requirement for smooth motion
# 9. Predictable, consistent behavior
# 10. Clear directional controls
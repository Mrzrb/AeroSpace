# AeroSpace 智能BSP配置示例
# 这个配置展示了如何使用新的智能BSP算法来动态调整窗口比例

# 启用BSP布局作为默认布局
default-root-container-layout = 'bsp'

# BSP配置
[bsp]
# 分割比例 (0.1 到 0.9 之间)
split-ratio = 0.5

# 自动分割阈值 - 当宽高比超过此值时自动选择分割方向
auto-split-threshold = 1.2

# 首选分割方向 ('horizontal', 'vertical', 或 'auto')
preferred-split-direction = 'auto'

# 启用智能重新平衡 - 在窗口移动后自动调整比例
enable-intelligent-rebalancing = true

# 启用自适应权重 - 根据容器特征智能分配权重
enable-adaptive-weighting = true

# 启用自动优化 - 在root container变化后自动优化BSP树结构
enable-auto-optimization = true

# 启用容器规范化
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# 键位绑定
[mode.main.binding]
# 基本窗口操作
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# 移动窗口 (会自动触发BSP优化)
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# 手动触发BSP优化
alt-shift-o = 'optimize-bsp'

# 调整窗口大小
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# 切换布局
alt-shift-t = 'layout tiles'
alt-shift-b = 'layout bsp'
alt-shift-a = 'layout accordion'

# 工作区操作
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'

alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'

# 监视器操作
alt-tab = 'focus-monitor next'
alt-shift-tab = 'move-node-to-monitor next'

# 全屏和浮动
alt-f = 'fullscreen'
alt-shift-space = 'layout floating tiling'

# 应用启动
alt-enter = 'exec-and-forget open -n /Applications/Alacritty.app'
alt-space = 'exec-and-forget open -n /Applications/Finder.app'
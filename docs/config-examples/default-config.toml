# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# This configuration includes advanced animation and visual effects features:
# - GPU-accelerated animations for better performance
# - Motion blur effects for fast-moving windows
# - Particle effects for window operations
# - Ripple effects for multi-window operations
# - Advanced easing functions (spring, bounce, elastic)
#
# Note: Visual effects are disabled by default for compatibility.
# Enable them by setting visual-effects.enabled = true

# Config version for compatibility and deprecations
# Fallback value (if you omit the key): config-version = 1
config-version = 2

# You can use it to add commands that run after AeroSpace startup.
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = []

# Start AeroSpace at login
start-at-login = false

# Automatically reload the config when the config file is saved
# After setting this to true, reload once manually to start the auto-reloading
auto-reload-config = false

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion|bsp
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = false

# List of workspaces that should stay alive even when they contain no windows,
# even when they are invisible.
# This config option is only available since 'config-version = 2'
# Fallback value (if you omit the key): persistent-workspaces = []
persistent-workspaces = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "A", "B",
                         "C", "D", "E", "F", "G", "I", "M", "N", "O", "P", "Q",
                         "R", "S", "T", "U", "V", "W", "X", "Y", "Z"]

# A callback that runs every time binding mode changes
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# See: https://nikitabobko.github.io/AeroSpace/commands#mode
on-mode-changed = []

# Possible values: (qwerty|dvorak|colemak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
    preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See:
#                 https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
    inner.horizontal = 0
    inner.vertical =   0
    outer.left =       0
    outer.bottom =     0
    outer.top =        0
    outer.right =      0

# BSP (Binary Space Partitioning) layout configuration
# BSP layout divides the screen space recursively into smaller regions
# See: https://nikitabobko.github.io/AeroSpace/guide#bsp-layout
[bsp]
    # Default split ratio when creating new splits (0.0 to 1.0)
    # 0.5 means equal split, 0.3 means 30% for new window, 70% for existing
    split-ratio = 0.5
    
    # Threshold for automatic split direction selection based on container aspect ratio
    # If width/height > auto-split-threshold, prefer vertical splits
    # If height/width > auto-split-threshold, prefer horizontal splits
    auto-split-threshold = 1.2
    
    # Preferred split direction for new windows
    # Possible values: 'auto', 'horizontal', 'vertical'
    # 'auto' uses the auto-split-threshold to decide
    # 'horizontal' always splits horizontally (new window below)
    # 'vertical' always splits vertically (new window to the right)
    preferred-split-direction = 'auto'

# Window animation configuration
# Provides smooth animations for window movements, resizing, and workspace transitions
# See: https://nikitabobko.github.io/AeroSpace/guide#animations
[animations]
    # Master switch to enable/disable all animations
    enabled = true
    
    # Default animation duration in seconds (0.01 to 2.0)
    default-duration = 0.25
    
    # Animation easing function
    # Possible values: 'linear', 'ease-in', 'ease-out', 'ease-in-out'
    # Advanced: 'spring(damping, velocity)', 'bounce(intensity)', 'elastic(amplitude, period)'
    # Custom: 'cubic-bezier(x1, y1, x2, y2)'
    easing-function = 'ease-out'
    
    # Respect system accessibility preferences (e.g., "Reduce Motion")
    respect-system-preferences = true
    
    # Per-operation animation settings
    move-animation-enabled = true
    resize-animation-enabled = true
    layout-change-animation-enabled = true
    workspace-transition-animation-enabled = true
    
    # Performance settings
    max-concurrent-animations = 10
    adaptive-quality = true
    min-frame-rate = 30.0
    
    # GPU acceleration settings
    gpu-acceleration-enabled = true
    # Possible values: 'disabled', 'automatic', 'forced'
    gpu-acceleration-mode = 'automatic'
    gpu-batch-size = 32
    gpu-fallback-threshold = 0.8
    
    # Spring animation settings (when using spring easing)
    spring-damping = 0.8
    spring-velocity = 0.0
    
    # Bounce animation settings (when using bounce easing)
    bounce-intensity = 1.0
    
    # Elastic animation settings (when using elastic easing)
    elastic-amplitude = 0.5
    elastic-period = 0.3

# Visual effects configuration
# Provides advanced visual effects like motion blur, particles, and ripples
# See: https://nikitabobko.github.io/AeroSpace/guide#visual-effects
[visual-effects]
    # Master switch to enable/disable all visual effects
    enabled = false  # Disabled by default for compatibility
    
    # Automatically adjust quality based on performance
    adaptive-quality = true
    
    # Performance threshold in milliseconds (~60fps = 16.67ms)
    performance-threshold = 16.67
    
    # Maximum concurrent effects
    max-concurrent-effects = 10
    
    # Effect quality level: 'low', 'medium', 'high', 'ultra'
    effect-quality-level = 'high'
    
    # Enable GPU acceleration for effects (requires Metal support)
    enable-gpu-acceleration = true
    
    # Motion blur effects for fast-moving windows
    [visual-effects.motion-blur]
        enabled = true
        # Velocity threshold to trigger motion blur (pixels/second)
        velocity-threshold = 100.0
        # Maximum blur speed (pixels/second)
        max-speed = 1000.0
        # Maximum blur intensity (0.0-1.0)
        max-intensity = 0.8
        # Automatically apply motion effects based on velocity
        automatic-effects = true
    
    # Afterimage/trail effects
    [visual-effects.afterimage]
        enabled = true
        # Number of afterimage frames in the trail
        trail-length = 5
        # Opacity decay rate (0.1-1.0)
        opacity-decay = 0.7
        # Update interval in seconds (~30fps = 0.033)
        update-interval = 0.033
    
    # Particle effects for window operations
    [visual-effects.particles]
        enabled = true
        # Number of particles per effect
        count = 20
        # Particle size in pixels
        size-width = 4.0
        size-height = 4.0
        # Effect duration in seconds
        duration = 1.0
        # Particle spread radius in pixels
        spread = 50.0
        # Particle velocity in pixels/second
        velocity = 100.0
        # Available particle types: 'spark', 'bubble', 'star', 'geometric'
        available-types = ['spark', 'bubble', 'star', 'geometric']
        # Default particle type
        default-type = 'spark'
    
    # Ripple effects for multi-window operations
    [visual-effects.ripple]
        enabled = true
        # Ripple propagation speed (pixels/second)
        speed = 300.0
        # Maximum ripple radius (pixels)
        max-radius = 200.0
        # Ripple duration (seconds)
        duration = 0.8
        # Ripple intensity (0.0-1.0)
        intensity = 0.6

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

    # All possible keys:
    # - Letters.        a, b, c, ..., z
    # - Numbers.        0, 1, 2, ..., 9
    # - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
    # - F-keys.         f1, f2, ..., f20
    # - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
    #                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
    #                   backspace, tab, pageUp, pageDown, home, end, forwardDelete,
    #                   sectionSign (ISO keyboards only, european keyboards only)
    # - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
    #                   keypadMinus, keypadMultiply, keypadPlus
    # - Arrows.         left, down, up, right

    # All possible modifiers: cmd, alt, ctrl, shift

    # All possible commands: https://nikitabobko.github.io/AeroSpace/commands

    # See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
    # You can uncomment the following lines to open up terminal with alt + enter shortcut
    # (like in i3)
    # alt-enter = '''exec-and-forget osascript -e '
    # tell application "Terminal"
    #     do script
    #     activate
    # end tell'
    # '''

    # See: https://nikitabobko.github.io/AeroSpace/commands#layout
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'
    alt-period = 'layout bsp'

    # See: https://nikitabobko.github.io/AeroSpace/commands#focus
    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # See: https://nikitabobko.github.io/AeroSpace/commands#resize
    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'
    alt-a = 'workspace A' # In your config, you can drop workspace bindings that you don't need
    alt-b = 'workspace B'
    alt-c = 'workspace C'
    alt-d = 'workspace D'
    alt-e = 'workspace E'
    alt-f = 'workspace F'
    alt-g = 'workspace G'
    alt-i = 'workspace I'
    alt-m = 'workspace M'
    alt-n = 'workspace N'
    alt-o = 'workspace O'
    alt-p = 'workspace P'
    alt-q = 'workspace Q'
    alt-r = 'workspace R'
    alt-s = 'workspace S'
    alt-t = 'workspace T'
    alt-u = 'workspace U'
    alt-v = 'workspace V'
    alt-w = 'workspace W'
    alt-x = 'workspace X'
    alt-y = 'workspace Y'
    alt-z = 'workspace Z'

    # See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
    alt-shift-1 = 'move-node-to-workspace 1'
    alt-shift-2 = 'move-node-to-workspace 2'
    alt-shift-3 = 'move-node-to-workspace 3'
    alt-shift-4 = 'move-node-to-workspace 4'
    alt-shift-5 = 'move-node-to-workspace 5'
    alt-shift-6 = 'move-node-to-workspace 6'
    alt-shift-7 = 'move-node-to-workspace 7'
    alt-shift-8 = 'move-node-to-workspace 8'
    alt-shift-9 = 'move-node-to-workspace 9'
    alt-shift-a = 'move-node-to-workspace A'
    alt-shift-b = 'move-node-to-workspace B'
    alt-shift-c = 'move-node-to-workspace C'
    alt-shift-d = 'move-node-to-workspace D'
    alt-shift-e = 'move-node-to-workspace E'
    alt-shift-f = 'move-node-to-workspace F'
    alt-shift-g = 'move-node-to-workspace G'
    alt-shift-i = 'move-node-to-workspace I'
    alt-shift-m = 'move-node-to-workspace M'
    alt-shift-n = 'move-node-to-workspace N'
    alt-shift-o = 'move-node-to-workspace O'
    alt-shift-p = 'move-node-to-workspace P'
    alt-shift-q = 'move-node-to-workspace Q'
    alt-shift-r = 'move-node-to-workspace R'
    alt-shift-s = 'move-node-to-workspace S'
    alt-shift-t = 'move-node-to-workspace T'
    alt-shift-u = 'move-node-to-workspace U'
    alt-shift-v = 'move-node-to-workspace V'
    alt-shift-w = 'move-node-to-workspace W'
    alt-shift-x = 'move-node-to-workspace X'
    alt-shift-y = 'move-node-to-workspace Y'
    alt-shift-z = 'move-node-to-workspace Z'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
    alt-tab = 'workspace-back-and-forth'
    # See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # See: https://nikitabobko.github.io/AeroSpace/commands#mode
    alt-shift-semicolon = 'mode service'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
    backspace = ['close-all-windows-but-current', 'mode main']

    # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
    #s = ['layout sticky tiling', 'mode main']

    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']

    down = 'volume down'
    up = 'volume up'
    shift-down = ['volume set 0', 'mode main']

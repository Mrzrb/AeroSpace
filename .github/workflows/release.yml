name: Cloud Build and Release

on:
  push:
    tags:
      - 'v*'  # 当推送以v开头的tag时触发
  workflow_dispatch:  # 手动触发
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string

env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

jobs:
  build-and-release:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # 使用GitHub Actions提供的Xcode设置
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      # 缓存Swift Package Manager依赖
      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/.cache/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-swift-${{ hashFiles('**/Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-
      
      # 缓存Homebrew依赖
      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/var/homebrew/locks
          key: ${{ runner.os }}-brew-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: |
            ${{ runner.os }}-brew-
      
      # 使用GitHub Actions的并行能力安装依赖
      - name: Install build tools
        run: |
          echo "Installing build dependencies using GitHub Actions runner..."
          
          # 更新Homebrew并安装工具
          brew update
          brew install bash fish xcbeautify swiftly
          
          # 设置Swift工具链
          swiftly init --skip-install --assume-yes --verbose
          swiftly install
          
          # 显示环境信息
          echo "=== Environment Info ==="
          sw_vers
          xcode-select -p
          swift --version
          xcodebuild -version
      
      # 安装项目特定依赖
      - name: Install project dependencies
        run: |
          echo "Installing project dependencies..."
          ./script/install-dep.sh --all
      
      # 确定版本号
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"
          
          # 设置构建环境变量
          echo "BUILD_VERSION=$VERSION" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_ENV
          echo "BUILD_COMMIT=${{ github.sha }}" >> $GITHUB_ENV
      
      # 运行测试（利用GitHub Actions的并行能力）
      - name: Run tests
        run: |
          echo "Running tests in GitHub Actions environment..."
          ./run-tests.sh
      
      # 云端编译构建
      - name: Build release artifacts
        run: |
          echo "Building release using GitHub Actions macOS runner..."
          echo "Version: $BUILD_VERSION"
          echo "Commit: $BUILD_COMMIT"
          echo "Build Date: $BUILD_DATE"
          
          # 使用GitHub Actions提供的代码签名（本地签名）
          ./build-release.sh --build-version "$BUILD_VERSION" --codesign-identity -
      
      # 构建失败时显示日志
      - name: Show build logs on failure
        if: failure()
        run: |
          echo "=== Build failed, showing logs ==="
          if [ -f ./.release/xcodebuild.log ]; then
            echo "=== Xcode Build Log ==="
            cat ./.release/xcodebuild.log
          fi
          
          echo "=== Environment Debug Info ==="
          env | grep -E "(XCODE|DEVELOPER|SWIFT)" || true
          ls -la .build/ || true
      
      # 验证构建产物
      - name: Verify build artifacts
        run: |
          echo "=== Verifying build artifacts ==="
          
          # 检查文件存在
          if [ ! -f ".release/AeroSpace-v$BUILD_VERSION.zip" ]; then
            echo "❌ Release ZIP not found"
            exit 1
          fi
          
          if [ ! -f ".release/aerospace" ]; then
            echo "❌ CLI binary not found"
            exit 1
          fi
          
          if [ ! -d ".release/AeroSpace.app" ]; then
            echo "❌ App bundle not found"
            exit 1
          fi
          
          # 显示文件信息
          echo "=== Release directory contents ==="
          ls -la .release/
          
          echo "=== Binary information ==="
          file .release/aerospace
          file .release/AeroSpace.app/Contents/MacOS/AeroSpace
          
          # 验证通用二进制
          echo "=== Verifying universal binaries ==="
          if file .release/aerospace | grep -q "universal binary"; then
            echo "✅ CLI is universal binary"
          else
            echo "❌ CLI is not universal binary"
            exit 1
          fi
          
          if file .release/AeroSpace.app/Contents/MacOS/AeroSpace | grep -q "universal binary"; then
            echo "✅ App is universal binary"
          else
            echo "❌ App is not universal binary"
            exit 1
          fi
          
          # 验证代码签名
          echo "=== Verifying code signatures ==="
          codesign -v .release/AeroSpace.app || echo "App signature check failed"
          codesign -v .release/aerospace || echo "CLI signature check failed"
          
          echo "✅ All artifacts verified successfully"
      
      # 生成发布说明
      - name: Generate release notes
        id: release_notes
        run: |
          echo "Generating release notes..."
          
          # 创建发布说明
          cat > release_notes.md << EOF
          ## AeroSpace v$BUILD_VERSION
          
          🚀 **Built with GitHub Actions Cloud Infrastructure**
          
          ### Build Information
          - **Version**: $BUILD_VERSION
          - **Commit**: [\`${BUILD_COMMIT:0:7}\`](https://github.com/${{ github.repository }}/commit/$BUILD_COMMIT)
          - **Build Date**: $BUILD_DATE
          - **Built on**: GitHub Actions (macOS-latest)
          
          ### What's Included
          - **AeroSpace.app** - macOS application (Universal Binary)
          - **aerospace** - Command-line interface (Universal Binary)
          - **Documentation** - Manual pages and shell completion
          
          ### Installation
          1. Download \`AeroSpace-v$BUILD_VERSION.zip\`
          2. Extract the archive
          3. Move \`AeroSpace.app\` to \`/Applications/\`
          4. Optionally add \`bin/aerospace\` to your PATH
          
          ### System Requirements
          - macOS 13.0 or later
          - Intel Mac or Apple Silicon Mac
          
          ---
          *This release was automatically built and deployed using GitHub Actions.*
          EOF
          
          # 设置输出
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      # 使用GitHub Actions创建Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.BUILD_VERSION }}
          name: AeroSpace v${{ env.BUILD_VERSION }}
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          draft: false
          prerelease: ${{ contains(env.BUILD_VERSION, '-') }}
          files: |
            .release/AeroSpace-v${{ env.BUILD_VERSION }}.zip
            .release/aerospace
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # 上传构建产物到GitHub Artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AeroSpace-v${{ env.BUILD_VERSION }}-artifacts
          path: |
            .release/
            !.release/xcodebuild.log
          retention-days: 90
          compression-level: 6
      
      # 可选：上传到其他云存储
      - name: Upload to cloud storage (optional)
        if: success()
        run: |
          echo "Build completed successfully!"
          echo "Release created: https://github.com/${{ github.repository }}/releases/tag/v$BUILD_VERSION"
          echo "Artifacts uploaded to GitHub Artifacts for 90 days"
          
          # 这里可以添加上传到其他云存储的逻辑
          # 例如：AWS S3, Google Cloud Storage, Azure Blob Storage 等
        continue-on-error: true

  # 可选：通知任务
  notify:
    needs: build-and-release
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Notify build result
        run: |
          if [ "${{ needs.build-and-release.result }}" = "success" ]; then
            echo "✅ Release build completed successfully!"
            echo "🎉 AeroSpace v${{ needs.build-and-release.outputs.version }} is now available"
          else
            echo "❌ Release build failed"
            echo "Please check the build logs for details"
          fi